<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Matching Web Light Mode by default */
      --bg-body: #fafafa;
      --bg-glass: rgba(255, 255, 255, 0.7);
      --bg-inner: rgba(255, 255, 255, 0.5);
      --border-color: rgba(0, 0, 0, 0.1);
      --text-main: #18181b;
      --text-muted: #71717a;
      --purple: #a855f7;
      --shadow-color: rgba(0,0,0,0.05);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-body: #070012;
        --bg-glass: rgba(0, 0, 0, 0.4);
        --bg-inner: rgba(0, 0, 0, 0.3);
        --border-color: rgba(255, 255, 255, 0.2);
        --text-main: #fafafa;
        --text-muted: #a1a1aa;
        --shadow-color: rgba(31,38,135,0.15);
      }
    }

    body {
      margin: 0;
      padding: 0;
      width: 380px;
      height: 520px;
      font-family: 'Inter', sans-serif;
      background: var(--bg-body);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Cosmic visual flare */
    body::before {
      content: '';
      position: absolute;
      top: -50px; left: -50px; width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.2) 0%, transparent 70%);
      border-radius: 50%; z-index: -1;
    }

    h1, h2, h3 {
      font-family: 'Outfit', sans-serif;
      margin: 0;
    }

    .header {
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .header h1 {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .container {
      flex-grow: 1;
      padding: 10px 20px 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }

    .hidden {
      display: none !important;
    }

    /* Form Inner Glass */
    .form-box {
      background: var(--bg-inner);
      border: 1px solid var(--border-color);
      border-radius: 20px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      backdrop-filter: blur(10px);
    }

    .form-box input {
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      font-size: 20px;
    }

    .form-box textarea {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      min-height: 80px;
    }

    .divider {
      height: 1px;
      width: 100%;
      background: linear-gradient(to right, rgba(168, 85, 247, 0.3), var(--border-color), transparent);
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .input-group label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      margin-left: 10px;
    }

    input, textarea {
      background: transparent;
      border: none;
      color: var(--text-main);
      outline: none;
      width: 100%;
      box-sizing: border-box;
    }
    
    .pill-input {
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: 50px;
      padding: 10px 15px;
      display: flex;
      align-items: center;
      transition: all 0.2s;
    }
    .pill-input:focus-within {
      border-color: rgba(168, 85, 247, 0.5);
    }

    input::placeholder, textarea::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .color-picker {
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      border-radius: 50px;
      padding: 8px 10px;
      display: flex;
      gap: 10px;
      backdrop-filter: blur(5px);
    }
    
    .swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 1px solid var(--border-color);
      transition: all 0.2s;
      position: relative;
    }
    .swatch:hover { transform: scale(1.1); }
    .swatch.active { 
      border-color: rgba(0,0,0,0.5);
      transform: scale(0.9);
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    @media (prefers-color-scheme: dark) {
      .swatch.active {
        border-color: rgba(255,255,255,0.5);
      }
    }

    button {
      background: var(--bg-glass);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
      padding: 14px;
      border-radius: 12px;
      cursor: pointer;
      margin-top: auto;
      transition: all 0.3s;
      box-shadow: 0 4px 15px var(--shadow-color);
    }
    
    button:hover {
      background: rgba(168, 85, 247, 0.1);
    }

    #logoutBtn {
      font-size: 10px;
      color: var(--text-muted);
      cursor: pointer;
      text-decoration: underline;
      text-align: center;
      margin-top: 10px;
    }
    
    .error-msg {
      color: #ff6b6b;
      font-size: 12px;
      text-align: center;
      font-weight: bold;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  
  <div class="header">
    <h1>Kurripu</h1>
  </div>

  <!-- AUTHENTICATION VIEW -->
  <div id="authView" class="container">
    <div style="text-align: center; margin-bottom: 5px;">
      <h2 style="font-size: 18px;">Welcome Tracker</h2>
      <p style="font-size: 12px; color: var(--text-muted);">Please login to your dashboard.</p>
    </div>
    
    <div class="input-group">
      <label>Email Address</label>
      <div class="pill-input">
        <input type="email" id="loginEmail" placeholder="commander@kurripu.com">
      </div>
    </div>
    
    <div class="input-group">
      <label>Password</label>
      <div class="pill-input">
        <input type="password" id="loginPassword" placeholder="••••••••">
      </div>
    </div>

    <div id="authError" class="error-msg"></div>

    <button id="loginBtn">Authenticate</button>
  </div>

  <!-- NOTE CREATOR VIEW -->
  <div id="noteView" class="container hidden">
    
    <div class="form-box">
      <input type="text" id="noteTitle" placeholder="Title of your note...">
      <div class="divider"></div>
      <textarea id="noteContent" placeholder="Start writing something..."></textarea>
    </div>
    
    <div class="input-group" style="margin-top: 5px;">
      <label>Tag Label</label>
      <div class="pill-input">
        <input type="text" id="noteLabel" placeholder="e.g. Work, Study">
      </div>
    </div>

    <div class="input-group" style="margin-top: 5px;">
      <label>Color Code</label>
      <div class="color-picker" id="colorPicker">
        <div class="swatch active" style="background: transparent;" data-color="default">
          <span style="position:absolute; top:5px; left:9px; font-size:10px; font-weight:bold; opacity:0.3; pointer-events:none;">-</span>
        </div>
        <div class="swatch" style="background: #ffb3ba;" data-color="pink"></div>
        <div class="swatch" style="background: #bae1ff;" data-color="blue"></div>
        <div class="swatch" style="background: #baffc9;" data-color="green"></div>
        <div class="swatch" style="background: #e2cbfe;" data-color="purple"></div>
      </div>
    </div>

    <div id="noteError" class="error-msg"></div>
    
    <div style="flex-grow: 1;"></div>

    <button id="saveBtn">Pin Note</button>
    <div id="logoutBtn">Unlink Session</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
